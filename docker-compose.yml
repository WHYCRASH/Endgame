# =========================================================================
# Endgame — Open WebUI + axum-embed + Qdrant + MetaMCP + function-sync
# =========================================================================
# Bring-up:
#   cp .env.example .env
#   # fill in: ANTHROPIC_API_KEY, OPENAI_API_KEY, WEBUI_SECRET_KEY,
#   #          OPENWEBUI_ADMIN_API_KEY, METAMCP_API_KEY, METAMCP_POSTGRES_PASSWORD
#   podman compose up -d
#
# Tested with `podman compose` (podman 5.x ships a compose v2 plugin).
# `docker compose` also works if you'd rather use that — the file is
# Compose-spec compliant.
#
# Notes:
#  - open-webui is built from the WHYCRASH/open-webui-Custom fork, NOT the
#    upstream ghcr image. The fork disables torch + sentence-transformers
#    in requirements.txt (axum-embed handles embeddings+rerank via
#    fastembed-rs), saving ~2.5GB image size and significant RAM.
#  - The open-webui-fork and metamcp submodules must be checked out:
#      git clone --recurse-submodules <this-repo>
#    If you already cloned without --recurse:
#      git submodule update --init --recursive
#  - axum-embed downloads ONNX models on first boot (~1-2 min). The
#    healthcheck start_period absorbs this; open-webui depends on it being
#    healthy before it starts.
#  - function-sync is a one-shot container: it reads functions/*.py and
#    tools/*.py from this repo and reconciles them into Open WebUI via the
#    API, then exits. It runs after open-webui is healthy.
#  - Open WebUI is configured via .env. Admin UI changes persist in its
#    sqlite volume and override .env on subsequent restarts (see
#    ENABLE_PERSISTENT_CONFIG). To keep .env authoritative, set
#    ENABLE_PERSISTENT_CONFIG=false in .env.
# =========================================================================

name: endgame

services:
  # -----------------------------------------------------------------------
  # Open WebUI — built from WHYCRASH/open-webui-Custom fork
  # -----------------------------------------------------------------------
  # The fork's Dockerfile + requirements.txt have been slimmed: torch and
  # sentence-transformers are removed in the non-CUDA path. Embeddings +
  # reranking are delegated to the axum-embed sidecar via
  # RAG_EMBEDDING_ENGINE=openai and RAG_RERANKING_ENGINE=external.
  open-webui:
    build:
      context: ./open-webui-Custom
      dockerfile: Dockerfile
      args:
        # Slim defaults; the fork's Dockerfile honours these.
        USE_CUDA: "false"
        USE_OLLAMA: "false"
        USE_SLIM: "false"
    restart: unless-stopped
    env_file: .env
    environment:
      # LLMs
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
      - OPENAI_API_BASE_URL
      - WEBUI_SECRET_KEY
      # RAG wiring -> axum-embed
      - RAG_EMBEDDING_ENGINE
      - RAG_EMBEDDING_MODEL
      - RAG_OPENAI_API_BASE_URL
      - RAG_OPENAI_API_KEY
      - RAG_EMBEDDING_QUERY_PREFIX
      - RAG_EMBEDDING_CONTENT_PREFIX
      - RAG_RERANKING_ENGINE
      - RAG_RERANKING_MODEL
      - RAG_EXTERNAL_RERANKER_URL
      - RAG_EXTERNAL_RERANKER_API_KEY
      - ENABLE_RAG_HYBRID_SEARCH
      - RAG_TOP_K
      - RAG_TOP_K_RERANKER
      - RAG_RELEVANCE_THRESHOLD
      # Vector DB -> qdrant
      - VECTOR_DB
      - QDRANT_URI
      # MCP tool server -> metamcp
      - ENABLE_DIRECT_CONNECTIONS
      - TOOL_SERVER_CONNECTIONS
    volumes:
      - open-webui-data:/app/backend/data
    ports:
      - "3001:8080"
    depends_on:
      axum-embed:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - endgame-net

  # -----------------------------------------------------------------------
  # axum-embed — Rust translation server (fastembed-rs)
  # -----------------------------------------------------------------------
  axum-embed:
    build:
      context: ./axum-embed
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - EMBED_MODEL
      - RERANK_MODEL
      - FASTEMBED_CACHE_DIR
      - LISTEN_ADDR
      - INTRA_THREADS
    volumes:
      - axum-cache:/data/.fastembed_cache
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080; printf 'GET /health HTTP/1.0\\r\\n\\r\\n' >&3; cat <&3 | head -1 | grep -q 200 || exit 1"]
      interval: 15s
      timeout: 3s
      start_period: 180s
      retries: 5
    networks:
      - endgame-net

  # -----------------------------------------------------------------------
  # Qdrant — vector database
  # -----------------------------------------------------------------------
  qdrant:
    image: docker.io/qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - endgame-net

  # -----------------------------------------------------------------------
  # MetaMCP — MCP aggregator (Umbrella-IT-Group fork, umbrella branch)
  # -----------------------------------------------------------------------
  # The entrypoint (docker-entrypoint.sh) defaults POSTGRES_HOST=postgres
  # and POSTGRES_USER=postgres, but our compose service is named
  # metamcp-postgres and we create the role as `metamcp`. drizzle (backend)
  # reads process.env.DATABASE_URL directly, so we set all three explicitly.
  metamcp:
    build:
      context: ./metamcp
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - METAMCP_API_KEY
      - METAMCP_POSTGRES_PASSWORD
      - POSTGRES_HOST=metamcp-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=metamcp
      - DATABASE_URL=postgresql://metamcp:${METAMCP_POSTGRES_PASSWORD}@metamcp-postgres:5432/metamcp
    depends_on:
      metamcp-postgres:
        condition: service_healthy
    ports:
      - "12008:12008"
    networks:
      - endgame-net

  metamcp-postgres:
    image: docker.io/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=metamcp
      - POSTGRES_PASSWORD=${METAMCP_POSTGRES_PASSWORD:?METAMCP_POSTGRES_PASSWORD must be set}
      - POSTGRES_DB=metamcp
    volumes:
      - metamcp-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metamcp"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - endgame-net

  # -----------------------------------------------------------------------
  # function-sync — one-shot bootstrap container
  # -----------------------------------------------------------------------
  # Reads functions/*.py and tools/*.py from this repo and reconciles them
  # into Open WebUI via /api/v1/functions/sync (declarative) and per-tool
  # /create /update /delete (manual diff, since tools have no /sync).
  # Deletions in the repo propagate to the instance.
  # Runs after open-webui is healthy, then exits 0.
  function-sync:
    build:
      context: ./sync
      dockerfile: Dockerfile
    restart: "no"
    env_file: .env
    environment:
      - OPENWEBUI_URL=http://open-webui:8080
      - OPENWEBUI_API_KEY=${OPENWEBUI_ADMIN_API_KEY:?OPENWEBUI_ADMIN_API_KEY must be set}
      - FUNCTIONS_DIR=/functions
      - TOOLS_DIR=/tools
    volumes:
      # Read-only mounts of the repo's source dirs into the sync container.
      - ./functions:/functions:ro
      - ./tools:/tools:ro
    depends_on:
      open-webui:
        condition: service_healthy
    networks:
      - endgame-net

# =========================================================================
# Volumes + networks
# =========================================================================
volumes:
  open-webui-data:    # open-webui sqlite db, uploads, cache
  axum-cache:         # fastembed ONNX model cache (e5-small + bge-reranker-base)
  qdrant-data:        # qdrant collections
  metamcp-pg-data:    # metamcp's postgres

networks:
  endgame-net:
    driver: bridge
